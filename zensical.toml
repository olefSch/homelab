[project]
site_name = "GitOps Homelab"
site_url = "https://homelab.ole-schildt.com/"
docs_dir = "docs"
repo_url = "https://github.com/olefSch/homelab"
repo_name = "olefSch/homelab"

copyright = """
Copyright &copy; 2026 Ole Schildt
"""

nav = [
  { "Home" = "index.md" },

  { "Architecture" = [
    { "Getting Started" = "architecture/getting-started.md" },
  ] },

  { "Data Platform" = [
    { "General Overview" = "data-platform/general-overview.md" },
  ] },

  { "Runbooks" = [
    { "Zero Touch RPi" = "runbooks/zero-touch-rpi-provisioning.md" },
  ] },

  { "ADRs" = [
    { "Template" = "adrs/000-template.md" },
  ] },
]

[project.theme]
name = "zensical"
variant = "modern"
custom_dir = "docs/overrides"
language = "en"
favicon = "assets/fav-icon.png"

features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "toc.follow",
  "search.suggest",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/git-alt"
