[project]
site_name = "GitOps Homelab"
site_url = "https://homelab.ole-schildt.com/"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Architecture Decisions" = [
    "adrs/000-template.md",
  ] },
  { "Platform Architecture" = [
    "architecture/getting-started.md",
  ] },
  { "My Data Platform" = [
    "data-platform/general-overview.md",
  ] },
  { "Runbooks" = [
    "runbooks/zero-touch-rpi-provisioning.md",
  ] },
]

[project.theme]
name = "zensical"
variant = "modern"
custom_dir = "overrides"

[[project.theme.palette]]
scheme = "slate"
[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"
