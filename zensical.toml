[project]
site_name = "GitOps Homelab"
site_url = "https://homelab.ole-schildt.com/"
docs_dir = "docs"
repo_url = "https://github.com/olefSch/homelab"
repo_name = "olefSch/homelab"

copyright = """
Copyright &copy; 2026 Ole Schildt
"""

nav = [
  { "Home" = "index.md" },

  { "Architecture" = [
    { "General Overview" = "architecture/00-general-overview.md" },
    { "K3s Cluster Design" = "architecture/01-k3s-cluster-design.md" },
    { "Core Networking" = "architecture/02-core-networking.md" },
    { "Storage & Persistence" = "architecture/03-storage-persistence.md" },
    { "Identity & Secrets" = "architecture/04-identity-and-secrets.md" },
    { "Observability" = "architecture/05-observability.md" },
  ] },

  { "Services" = [
    { "All Services" = "services/00-list-of-all.md" },
  ] },

  { "Operations" = [
    { "Update K3s Version" = "sops/update-k3s-version.md" },
  ] },

  { "Runbooks" = [
    { "Zero Touch RPi Provisioning" = "runbooks/01-zero-touch-rpi-provisioning.md" },
  ] },

  { "Architecture Decision Records" = [
    { "ADR 000: Template" = "adrs/000-template.md" },
    { "ADR 001: K3s HA on Bare Metal" = "adrs/001-k3s-ha-bare-metal.md" },
    { "ADR 002: ArgoCD for GitOps" = "adrs/002-argocd-for-gitops.md" },
    { "ADR 003: Zero Touch Provisioning" = "adrs/003-zero-touch-provisioning.md" },
  ] },
]

[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.footnotes]


[project.theme]
name = "zensical"
variant = "modern"
custom_dir = "docs/overrides"
language = "en"
favicon = "assets/fav-icon.png"
logo = "assets/logo-icon.png"

features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "toc.follow",
  "search.suggest",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/git-alt"

[[project.plugins]]
name = "tags"
