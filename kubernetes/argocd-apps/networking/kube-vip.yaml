apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-vip-services
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/olefSch/homelab.git'
    targetRevision: HEAD
    path: kubernetes/apps/networking/kube-vip
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
