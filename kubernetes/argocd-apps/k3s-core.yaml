apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/olefSch/homelab.git'
    targetRevision: HEAD
    path: kubernetes/k3s-manifests
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
